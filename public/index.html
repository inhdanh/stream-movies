<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamTV HLS Transcoder</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- HLS.js for web player -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#6366f1', // Indigo
                            600: '#4f46e5',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --panel: rgba(33, 43, 57, 0.88);
            --panel-soft: rgba(40, 51, 66, 0.82);
            --line: rgba(148, 163, 184, 0.22);
            --line-strong: rgba(148, 163, 184, 0.34);
            --text: #f8fafc;
            --muted: #9aa7b7;
            --accent: #84e1df;
            --violet: #8b7cf6;
        }
        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 84% 24%, rgba(45, 212, 191, 0.1), transparent 26rem),
                radial-gradient(circle at 18% 0%, rgba(99, 102, 241, 0.18), transparent 24rem),
                linear-gradient(120deg, #06111f 0%, #0a1729 46%, #06101d 100%);
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(108deg, transparent 0 64%, rgba(255, 255, 255, 0.035) 64% 65%, transparent 65%),
                radial-gradient(circle at 96% 93%, rgba(226, 232, 240, 0.7) 0 0.45rem, transparent 0.48rem),
                radial-gradient(circle at 94% 93%, rgba(226, 232, 240, 0.26) 0 1.7rem, transparent 1.75rem);
            opacity: 0.9;
        }
        .glass {
            background: var(--panel);
            border: 1px solid var(--line-strong);
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .panel-title {
            background: linear-gradient(180deg, rgba(57, 69, 86, 0.72), rgba(40, 50, 64, 0.72));
            border-bottom: 1px solid var(--line);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.45);
        }
        .glass-hover:hover {
            background: rgba(58, 70, 88, 0.72);
            border-color: rgba(148, 163, 184, 0.34);
        }
        .stv-logo {
            letter-spacing: -0.08em;
            text-shadow: 0 2px 12px rgba(99, 102, 241, 0.6);
        }
        /* Checkbox styling */
        .custom-checkbox {
            appearance: none;
            width: 0.875rem;
            height: 0.875rem;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 0.2rem;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.35);
        }
        .custom-checkbox:checked {
            background-color: #667eea;
            border-color: #8b7cf6;
        }
        .custom-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.35); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.34); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(132, 225, 223, 0.6); 
        }
    </style>
</head>

    <script>
        const baseUrl = window.location.origin;
        let selectedMovie = null;
        let selectedPaths = new Set();
        let pollInterval = null;
        let hls = null;
        let lastSavedTime = 0;
        let syncInterval = null;

        function encodeStreamPath(filename) {
            return filename.split('/').map(part => encodeURIComponent(part)).join('/');
        }

        function getM3u8Url(filename) {
            return `${baseUrl}/stream/${encodeStreamPath(filename)}/master.m3u8`;
        }

        function getCoverUrl(coverBasePath) {
            return `${baseUrl}/stream/${encodeStreamPath(coverBasePath)}/cover.jpg`;
        }

        function getSelectedMovieButton(filename = selectedMovie) {
            if (!filename) return null;
            return Array.from(document.querySelectorAll('.movie-item-btn'))
                .find(btn => btn.dataset.path === filename) || null;
        }

        async function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.top = '-9999px';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();

            try {
                const copied = document.execCommand('copy');
                if (!copied) {
                    throw new Error('Copy command failed');
                }
            } finally {
                document.body.removeChild(textarea);
            }
        }

        function showCopyButtonState(success) {
            const btn = document.getElementById('btn-copy-m3u8');
            const originalText = btn.dataset.originalHtml || btn.innerHTML;
            btn.dataset.originalHtml = originalText;

            if (success) {
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;
                btn.classList.add('text-green-400', 'border-green-400');
                btn.classList.remove('text-red-400', 'border-red-400');
            } else {
                btn.innerHTML = 'Copy failed';
                btn.classList.add('text-red-400', 'border-red-400');
                btn.classList.remove('text-green-400', 'border-green-400');
            }

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('text-green-400', 'border-green-400', 'text-red-400', 'border-red-400');
            }, 2000);
        }

        // Elements
        const movieListEl = document.getElementById('movie-list');
        const loadingMoviesEl = document.getElementById('loading-movies');
        const emptyStateEl = document.getElementById('empty-state');
        const detailStateEl = document.getElementById('detail-state');
        const playerContainer = document.getElementById('player-container');
        const videoPlayer = document.getElementById('video-player');
        const bulkActionBar = document.getElementById('bulk-action-bar');
        const selectedCountEl = document.getElementById('selected-count');
        
        // Load Movies
        async function loadMovies() {
            try {
                const res = await fetch(`${baseUrl}/movies`);
                const data = await res.json();
                loadingMoviesEl.classList.add('hidden');
                
                if (!data.movies || data.movies.length === 0) {
                    movieListEl.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">No movies found in D:/Movies</p>';
                    return;
                }

                movieListEl.innerHTML = '';

                // Group movies by folder
                const grouped = data.movies.reduce((acc, movie) => {
                    // For old strings, fallback to Root
                    if (typeof movie === 'string') {
                        if (!acc['Root']) acc['Root'] = [];
                        acc['Root'].push({ name: movie, path: movie, isTranscoded: false });
                        return acc;
                    }
                    const folder = movie.folder || 'Root';
                    if (!acc[folder]) acc[folder] = [];
                    acc[folder].push(movie);
                    return acc;
                }, {});

                // Render folders
                Object.keys(grouped).sort().forEach(folder => {
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'mb-5';
                    
                    const header = document.createElement('div');
                    header.className = 'flex items-center justify-between sticky top-0 bg-[#202a38] py-1.5 z-10 mb-2';
                    
                    const headerTitle = document.createElement('h3');
                    headerTitle.className = 'text-[0.68rem] font-extrabold text-white uppercase tracking-wide';
                    headerTitle.textContent = folder === 'Root' ? 'Uncategorized' : folder;
                    
                    const folderCheckContainer = document.createElement('div');
                    folderCheckContainer.className = 'flex items-center gap-2 pr-1';
                    
                    const folderCheckbox = document.createElement('input');
                    folderCheckbox.type = 'checkbox';
                    folderCheckbox.className = 'custom-checkbox folder-checkbox';
                    folderCheckbox.dataset.folder = folder;
                    folderCheckbox.onclick = (e) => toggleFolderSelection(folder, e.target.checked);
                    
                    const folderLabel = document.createElement('span');
                    folderLabel.className = 'text-[10px] text-slate-500 font-bold';
                    folderLabel.textContent = 'ALL';
                    
                    folderCheckContainer.appendChild(folderLabel);
                    folderCheckContainer.appendChild(folderCheckbox);
                    
                    header.appendChild(headerTitle);
                    header.appendChild(folderCheckContainer);
                    folderDiv.appendChild(header);

                    const list = document.createElement('div');
                    list.className = 'space-y-2';

                    grouped[folder].forEach(movieObj => {
                        const movieName = movieObj.name;
                        const displayName = movieObj.displayName || movieObj.name;
                        const moviePath = movieObj.path;
                        const isReady = movieObj.isTranscoded;
                        
                        const itemWrapper = document.createElement('div');
                        itemWrapper.className = 'flex items-center gap-2 group';
                        
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.className = 'custom-checkbox movie-checkbox';
                        checkbox.dataset.path = moviePath;
                        checkbox.dataset.folder = folder;
                        checkbox.checked = selectedPaths.has(moviePath);
                        checkbox.onclick = (e) => {
                            e.stopPropagation();
                            toggleSelection(moviePath, e.target.checked);
                        };

                        const btn = document.createElement('button');
                        btn.className = 'movie-item-btn min-w-0 flex-1 text-left px-2 py-1.5 rounded-md glass-hover transition-colors text-xs font-medium flex justify-between items-center border border-transparent focus:outline-none focus:border-cyan-300/60';
                        btn.dataset.path = moviePath;
                        btn.dataset.folder = movieObj.folder || '';
                        btn.dataset.hasCover = movieObj.hasCover ? 'true' : 'false';
                        btn.dataset.coverBasePath = movieObj.coverBasePath || moviePath;
                        btn.dataset.displayName = displayName;
                        btn.dataset.metadataScope = movieObj.metadataScope || 'movie';
                        btn.dataset.metadataKey = movieObj.metadataKey || moviePath;
                        btn.dataset.metadataTitle = movieObj.title || displayName;
                        btn.dataset.episodeStart = movieObj.episodeStart || '';
                        btn.dataset.episodeNumber = movieObj.episodeNumber || '';
                        btn.title = movieName;
                        
                        if (movieObj.hasCover) {
                            const thumb = document.createElement('img');
                            thumb.className = 'w-9 h-12 object-cover rounded-sm bg-slate-900 border border-white/10 flex-shrink-0 mr-2';
                            thumb.src = getCoverUrl(btn.dataset.coverBasePath);
                            thumb.alt = '';
                            thumb.loading = 'lazy';
                            btn.appendChild(thumb);
                        }

                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'movie-display-name truncate pr-2 flex-1';
                        nameSpan.textContent = displayName;
                        
                        btn.appendChild(nameSpan);
                        
                        if (isReady) {
                            const badge = document.createElement('span');
                            badge.className = 'ready-badge bg-emerald-500/15 text-emerald-300 text-[9px] px-1.5 py-0.5 rounded border border-emerald-400/25 flex-shrink-0';
                            badge.textContent = 'READY';
                            btn.appendChild(badge);
                        }
                        
                        btn.onclick = () => selectMovie(moviePath, btn);
                        
                        itemWrapper.appendChild(checkbox);
                        itemWrapper.appendChild(btn);
                        list.appendChild(itemWrapper);
                    });

                    folderDiv.appendChild(list);
                    movieListEl.appendChild(folderDiv);
                });
                
                updateBulkBar();

            } catch (err) {
                loadingMoviesEl.innerHTML = '<p class="text-red-400 text-sm">Failed to load movies.</p>';
            }
        }

        // Selection Logic
        function toggleSelection(path, isChecked) {
            if (isChecked) {
                selectedPaths.add(path);
            } else {
                selectedPaths.delete(path);
            }
            updateBulkBar();
        }

        function toggleFolderSelection(folder, isChecked) {
            const checkboxes = document.querySelectorAll(`.movie-checkbox[data-folder="${folder}"]`);
            checkboxes.forEach(cb => {
                cb.checked = isChecked;
                if (isChecked) selectedPaths.add(cb.dataset.path);
                else selectedPaths.delete(cb.dataset.path);
            });
            updateBulkBar();
        }

        function clearSelection() {
            selectedPaths.clear();
            document.querySelectorAll('.movie-checkbox, .folder-checkbox').forEach(cb => cb.checked = false);
            updateBulkBar();
        }

        function updateBulkBar() {
            const count = selectedPaths.size;
            selectedCountEl.textContent = count;
            if (count > 0) {
                bulkActionBar.classList.remove('translate-y-32');
            } else {
                bulkActionBar.classList.add('translate-y-32');
            }
        }

        async function bulkDelete(deleteOriginal) {
            if (selectedPaths.size === 0) return;
            
            const message = deleteOriginal 
                ? `Are you sure you want to delete ${selectedPaths.size} items AND their original files? This cannot be undone.`
                : `Are you sure you want to delete HLS data for ${selectedPaths.size} items?`;
                
            if (!confirm(message)) return;

            try {
                const res = await fetch(`${baseUrl}/movies`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paths: Array.from(selectedPaths),
                        deleteOriginal
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    alert(data.message);
                    selectedPaths.clear();
                    loadMovies();
                    if (selectedMovie && Array.from(selectedPaths).includes(selectedMovie)) {
                        resetDetailView();
                    }
                } else {
                    const err = await res.json();
                    alert(`Error: ${err.error}`);
                }
            } catch (err) {
                alert('Request failed');
            }
        }

        async function deleteCurrentMovie(deleteOriginal) {
            if (!selectedMovie) return;
            
            const message = deleteOriginal 
                ? `Are you sure you want to delete "${selectedMovie}" AND its original file?`
                : `Are you sure you want to delete HLS data for "${selectedMovie}"?`;
                
            if (!confirm(message)) return;

            try {
                const res = await fetch(`${baseUrl}/movies`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paths: [selectedMovie],
                        deleteOriginal
                    })
                });

                if (res.ok) {
                    loadMovies();
                    resetDetailView();
                } else {
                    const err = await res.json();
                    alert(`Error: ${err.error}`);
                }
            } catch (err) {
                alert('Request failed');
            }
        }

        function resetDetailView() {
            selectedMovie = null;
            emptyStateEl.classList.remove('hidden');
            detailStateEl.classList.add('hidden');
            document.getElementById('cover-preview').classList.add('hidden');
            document.getElementById('cover-upload-status').textContent = '';
            document.getElementById('metadata-save-status').textContent = '';
            stopPlayer();
        }

        function populateMetadataEditor(btnElement) {
            const titleInput = document.getElementById('metadata-title-input');
            const episodeField = document.getElementById('metadata-episode-field');
            const episodeInput = document.getElementById('metadata-episode-start-input');
            const titleLabel = document.getElementById('metadata-title-label');

            const isSeries = btnElement?.dataset.metadataScope === 'series';
            titleLabel.textContent = isSeries ? 'Series title' : 'Display title';
            titleInput.value = btnElement?.dataset.metadataTitle || btnElement?.dataset.displayName || '';
            episodeInput.value = btnElement?.dataset.episodeStart || '1';
            episodeField.classList.toggle('hidden', !isSeries);
        }

        function updateCoverPreview(filename, hasCover, coverBasePath = filename) {
            const preview = document.getElementById('cover-preview');
            const image = document.getElementById('cover-image');

            if (!hasCover) {
                image.removeAttribute('src');
                preview.classList.add('hidden');
                return;
            }

            image.src = `${getCoverUrl(coverBasePath)}?t=${Date.now()}`;
            image.onerror = () => preview.classList.add('hidden');
            image.onload = () => preview.classList.remove('hidden');
        }

        function ensureMovieButtonCover(btn, coverBasePath) {
            if (!btn) return;

            btn.dataset.hasCover = 'true';
            btn.dataset.coverBasePath = coverBasePath;
            let thumb = btn.querySelector('img');
            if (!thumb) {
                thumb = document.createElement('img');
                thumb.className = 'w-9 h-12 object-cover rounded-sm bg-slate-900 border border-white/10 flex-shrink-0 mr-2';
                thumb.alt = '';
                thumb.loading = 'lazy';
                thumb.onerror = () => thumb.remove();
                btn.insertBefore(thumb, btn.firstChild);
            }

            thumb.src = `${getCoverUrl(coverBasePath)}?t=${Date.now()}`;
        }

        function updateMovieButtonsForCover(coverBasePath) {
            document.querySelectorAll('.movie-item-btn').forEach(btn => {
                const isSameMovie = btn.dataset.path === coverBasePath;
                const isSameSeries = btn.dataset.folder && btn.dataset.folder === coverBasePath;
                if (isSameMovie || isSameSeries) {
                    ensureMovieButtonCover(btn, coverBasePath);
                }
            });
        }

        async function uploadCoverImage(file) {
            if (!selectedMovie || !file) return;

            const statusEl = document.getElementById('cover-upload-status');
            const uploadBtn = document.getElementById('btn-upload-cover');
            const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];

            if (!allowedTypes.includes(file.type)) {
                statusEl.textContent = 'Only JPEG, PNG, or WebP images are supported.';
                statusEl.className = 'text-xs text-red-400';
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                statusEl.textContent = 'Cover image must be 10MB or smaller.';
                statusEl.className = 'text-xs text-red-400';
                return;
            }

            try {
                uploadBtn.disabled = true;
                uploadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                statusEl.textContent = 'Uploading...';
                statusEl.className = 'text-xs text-slate-400';

                const res = await fetch(`${baseUrl}/movies/${encodeURIComponent(selectedMovie)}/cover`, {
                    method: 'POST',
                    headers: { 'Content-Type': file.type },
                    body: file
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(data.error || 'Failed to upload cover');
                }

                const coverBasePath = data.coverBasePath || selectedMovie;
                updateCoverPreview(selectedMovie, true, coverBasePath);
                updateMovieButtonsForCover(coverBasePath);
                statusEl.textContent = 'Cover updated.';
                statusEl.className = 'text-xs text-green-400';
            } catch (err) {
                statusEl.textContent = err.message || 'Upload failed.';
                statusEl.className = 'text-xs text-red-400';
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                document.getElementById('cover-upload-input').value = '';
            }
        }

        async function saveMovieMetadata() {
            if (!selectedMovie) return;

            const selectedBtn = getSelectedMovieButton();
            const titleInput = document.getElementById('metadata-title-input');
            const episodeInput = document.getElementById('metadata-episode-start-input');
            const saveBtn = document.getElementById('btn-save-metadata');
            const statusEl = document.getElementById('metadata-save-status');
            const title = titleInput.value.trim();
            const isSeries = selectedBtn?.dataset.metadataScope === 'series';

            if (!title) {
                statusEl.textContent = 'Title is required.';
                statusEl.className = 'md:col-span-3 text-xs text-red-400';
                return;
            }

            const payload = { title };
            if (isSeries) {
                const episodeStart = Number.parseInt(episodeInput.value, 10);
                if (!Number.isFinite(episodeStart) || episodeStart < 1) {
                    statusEl.textContent = 'Episode start must be 1 or higher.';
                    statusEl.className = 'md:col-span-3 text-xs text-red-400';
                    return;
                }
                payload.episodeStart = episodeStart;
            }

            try {
                saveBtn.disabled = true;
                saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
                statusEl.textContent = 'Saving...';
                statusEl.className = 'md:col-span-3 text-xs text-slate-400';

                const res = await fetch(`${baseUrl}/movies/${encodeURIComponent(selectedMovie)}/metadata`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(data.error || 'Failed to save metadata');
                }

                await loadMovies();
                const refreshedBtn = getSelectedMovieButton();
                if (refreshedBtn) {
                    selectMovie(selectedMovie, refreshedBtn);
                }
                document.getElementById('metadata-save-status').textContent = 'Metadata saved.';
                document.getElementById('metadata-save-status').className = 'md:col-span-3 text-xs text-green-400';
            } catch (err) {
                statusEl.textContent = err.message || 'Save failed.';
                statusEl.className = 'md:col-span-3 text-xs text-red-400';
            } finally {
                saveBtn.disabled = false;
                saveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // Select Movie
        function selectMovie(filename, btnElement) {
            // Highlight selected
            movieListEl.querySelectorAll('.movie-item-btn').forEach(el => {
                el.classList.remove('bg-slate-600/55', 'border-slate-400/35');
            });
            if (btnElement) {
                btnElement.classList.add('bg-slate-600/55', 'border-slate-400/35');
            }

            selectedMovie = filename;
            emptyStateEl.classList.add('hidden');
            detailStateEl.classList.remove('hidden');
            
            // Reset state
            document.getElementById('cover-upload-status').textContent = '';
            document.getElementById('metadata-save-status').textContent = '';
            document.getElementById('movie-title').textContent = btnElement?.dataset.displayName || filename.split('/').pop();
            populateMetadataEditor(btnElement);
            updateCoverPreview(filename, btnElement?.dataset.hasCover === 'true', btnElement?.dataset.coverBasePath || filename);
            hideProgress();
            stopPlayer();
            document.getElementById('btn-copy-m3u8').classList.add('hidden');
            
            // Stop existing polling
            if (pollInterval) clearInterval(pollInterval);

            // Check status immediately
            checkStatus();
        }

        function showProgress(percent) {
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('progress-text').classList.remove('hidden');
            document.getElementById('error-text').classList.add('hidden');
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').textContent = `${percent}%`;
        }

        function hideProgress() {
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('progress-text').classList.add('hidden');
            document.getElementById('progress-bar').style.width = `0%`;
            document.getElementById('btn-transcode').disabled = false;
            document.getElementById('btn-transcode').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        // Check Transcode Status
        async function checkStatus() {
            if (!selectedMovie) return;
            try {
                const res = await fetch(`${baseUrl}/movies/${encodeURIComponent(selectedMovie)}/transcode/status`);
                const statusData = await res.json();

                if (statusData.status === 'processing') {
                    document.getElementById('btn-transcode').disabled = true;
                    document.getElementById('btn-transcode').classList.add('opacity-50', 'cursor-not-allowed');
                    showProgress(statusData.progress);
                    
                    // Poll
                    if (!pollInterval) {
                        pollInterval = setInterval(checkStatus, 3000);
                    }
                } else if (statusData.status === 'completed') {
                    if (pollInterval) clearInterval(pollInterval);
                    pollInterval = null;
                    hideProgress();
                    document.getElementById('progress-text').classList.remove('hidden');
                    document.getElementById('progress-text').textContent = 'Completed!';
                    document.getElementById('progress-text').classList.add('text-green-400');
                    document.getElementById('btn-copy-m3u8').classList.remove('hidden');
                    const selectedBtn = getSelectedMovieButton();
                    const coverBasePath = selectedBtn?.dataset.hasCover === 'true'
                        ? selectedBtn.dataset.coverBasePath || selectedMovie
                        : selectedMovie;
                    updateCoverPreview(selectedMovie, true, coverBasePath);
                    
                    // Setup Player
                    setupPlayer(selectedMovie);
                } else if (statusData.status === 'error') {
                    if (pollInterval) clearInterval(pollInterval);
                    pollInterval = null;
                    hideProgress();
                    document.getElementById('error-text').classList.remove('hidden');
                    document.getElementById('error-text').textContent = `Error: ${statusData.error}`;
                } else {
                    // Idle
                    if (pollInterval) clearInterval(pollInterval);
                    pollInterval = null;
                }
            } catch (err) {
                console.error('Failed to check status', err);
            }
        }

        // Transcode Button
        document.getElementById('btn-transcode').addEventListener('click', async () => {
            if (!selectedMovie) return;
            try {
                document.getElementById('btn-transcode').disabled = true;
                const res = await fetch(`${baseUrl}/movies/${encodeURIComponent(selectedMovie)}/transcode`, {
                    method: 'POST'
                });
                if (res.ok) {
                    checkStatus();
                } else {
                    const err = await res.json();
                    alert(`Failed to start: ${err.error}`);
                    document.getElementById('btn-transcode').disabled = false;
                }
            } catch (err) {
                alert('Request failed');
                document.getElementById('btn-transcode').disabled = false;
            }
        });

        // Copy M3U8 Button
        document.getElementById('btn-copy-m3u8').addEventListener('click', async () => {
            if (!selectedMovie) return;
            const m3u8Url = getM3u8Url(selectedMovie);

            try {
                await copyText(m3u8Url);
                showCopyButtonState(true);
            } catch (err) {
                console.error('Failed to copy link', err);
                showCopyButtonState(false);
            }
        });

        document.getElementById('btn-upload-cover').addEventListener('click', () => {
            if (!selectedMovie) return;
            document.getElementById('cover-upload-input').click();
        });

        document.getElementById('cover-upload-input').addEventListener('change', (event) => {
            uploadCoverImage(event.target.files[0]);
        });

        document.getElementById('btn-save-metadata').addEventListener('click', saveMovieMetadata);

        // Web Player Setup
        function setupPlayer(filename) {
            playerContainer.classList.remove('hidden');
            const m3u8Url = getM3u8Url(filename);
            
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls({
                    // Enable subtitles
                    renderTextTracksNatively: false
                });
                hls.loadSource(m3u8Url);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, async function () {
                    console.log('Manifest parsed. Available audio tracks:', hls.audioTracks);
                    console.log('Available subtitle tracks:', hls.subtitleTracks);
                    
                    // Load and resume progress
                    const progress = await loadProgressFromServer(filename);
                    if (progress && progress.seconds > 5) {
                        console.log(`Resuming from ${progress.seconds}s`);
                        videoPlayer.currentTime = progress.seconds;
                    }
                });

                // Periodic sync
                if (syncInterval) clearInterval(syncInterval);
                syncInterval = setInterval(() => {
                    if (!videoPlayer.paused && videoPlayer.currentTime > 0) {
                        // Only save if changed significantly (e.g. every 5 seconds)
                        if (Math.abs(videoPlayer.currentTime - lastSavedTime) > 5) {
                            saveProgressOnServer(filename, videoPlayer.currentTime, videoPlayer.duration);
                            lastSavedTime = videoPlayer.currentTime;
                        }
                    }
                }, 5000);


                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error("fatal network error encountered, try to recover");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error("fatal media error encountered, try to recover");
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari native HLS
                videoPlayer.src = m3u8Url;
            }
        }



        function stopPlayer() {
            playerContainer.classList.add('hidden');
            videoPlayer.pause();
            if (hls) {
                hls.destroy();
                hls = null;
            }
            if (syncInterval) {
                clearInterval(syncInterval);
                syncInterval = null;
            }
        }

        async function loadProgressFromServer(filename) {
            try {
                const res = await fetch(`${baseUrl}/movies/${encodeURIComponent(filename)}/progress`);
                return await res.json();
            } catch (err) {
                console.error('Failed to load progress', err);
                return null;
            }
        }

        async function saveProgressOnServer(filename, seconds, duration) {
            try {
                await fetch(`${baseUrl}/movies/${encodeURIComponent(filename)}/progress`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ seconds, duration })
                });
            } catch (err) {
                console.error('Failed to save progress', err);
            }
        }

        // Auto Transcode Button
        document.getElementById('btn-auto-transcode').addEventListener('click', async () => {
            const btn = document.getElementById('btn-auto-transcode');
            const originalContent = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = `<svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Starting...`;
                
                const res = await fetch(`${baseUrl}/movies/auto-transcode`, {
                    method: 'POST'
                });
                
                if (res.ok) {
                    btn.innerHTML = `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Scanning Library...`;
                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                        // Reload movies to show any new status
                        loadMovies();
                    }, 3000);
                } else {
                    alert('Failed to start auto-transcoding');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Request failed');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });

        // SSE Listener for real-time updates
        const eventSource = new EventSource(`${baseUrl}/events`);
        
        eventSource.addEventListener('progress', (e) => {
            const data = JSON.parse(e.data);
            if (selectedMovie === data.filename) {
                showProgress(data.progress);
            }
        });

        eventSource.addEventListener('finished', (e) => {
            const data = JSON.parse(e.data);
            console.log('Transcode finished event:', data);
            
            // Update list item badge in the sidebar
            const movieBtns = document.querySelectorAll(`.movie-item-btn`);
            movieBtns.forEach(btn => {
                if (btn.dataset.path === data.filename && data.status === 'completed') {
                    const coverBasePath = btn.dataset.hasCover === 'true'
                        ? btn.dataset.coverBasePath || data.filename
                        : data.filename;
                    ensureMovieButtonCover(btn, coverBasePath);

                    // Check if already has READY badge
                    if (!btn.querySelector('.ready-badge')) {
                        const badge = document.createElement('span');
                        badge.className = 'ready-badge bg-emerald-500/15 text-emerald-300 text-[9px] px-1.5 py-0.5 rounded border border-emerald-400/25 flex-shrink-0';
                        badge.textContent = 'READY';
                        btn.appendChild(badge);
                    }
                }
            });

            if (selectedMovie === data.filename) {
                checkStatus(); // Handle UI update for selected movie (setup player, etc.)
            }
        });

        // Init
        loadMovies();
    </script>
